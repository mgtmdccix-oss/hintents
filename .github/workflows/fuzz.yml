name: Fuzz Testing CI

on:
  push:
    paths:
      - 'simulator/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'simulator/**'
      - '.github/workflows/fuzz.yml'

jobs:
  sancov_build:
    name: Compile SanitizerCoverage Harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust Nightly Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Reclaim runner temp space before fuzz build
        run: bash ./scripts/ci-clean-build-space.sh

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./simulator
          cache-targets: false

      - name: Execute LLVM SanitizerCoverage Pass
        working-directory: ./simulator
        run: cargo rustc --bin simulator -- -C passes=sancov-module

      - name: Reclaim runner temp space after fuzz build
        if: always()
        run: bash ./scripts/ci-clean-build-space.sh
